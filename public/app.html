<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Shadai | Painel</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="panel-body">
  <div class="shell">
    <header class="topbar card-shell">
      <div class="brand-row">
        <div class="brand-avatar" id="brand-avatar">ES</div>
        <div>
          <h1 id="company-title">El Shadai</h1>
          <p id="company-subtitle" class="muted"></p>
        </div>
      </div>
      <div class="topbar-actions">
        <span class="plan-pill" id="plan-badge">Plano ativo</span>
        <button id="logout-btn" class="ghost-btn">Sair</button>
      </div>
    </header>

    <nav class="tabbar card-shell" id="tabbar">
      <button class="tab-btn active" data-tab="agenda">Agenda</button>
      <button class="tab-btn" data-tab="services">Servicos</button>
      <button class="tab-btn" data-tab="team">Equipe</button>
      <button class="tab-btn" data-tab="clients">Clientes</button>
      <button class="tab-btn" data-tab="billing">Assinatura</button>
      <button class="tab-btn disabled" type="button">Caixa</button>
      <button class="tab-btn disabled" type="button">Compras</button>
      <button class="tab-btn disabled" type="button">Estoque</button>
      <button class="tab-btn disabled" type="button">Mapa</button>
    </nav>

    <main>
      <section id="metrics" class="metrics-row"></section>

      <section class="view active" id="view-agenda">
        <div class="card-shell section-head">
          <div class="search-wrap">
            <input type="text" id="appointment-search" placeholder="Buscar por cliente, placa ou telefone..." />
            <div class="status-tabs" id="status-tabs">
              <button class="status-tab active" data-status="todos">Todos</button>
              <button class="status-tab" data-status="aguardando">Aguardando</button>
              <button class="status-tab" data-status="em_lavagem">Em Lavagem</button>
              <button class="status-tab" data-status="pronto">Pronto</button>
              <button class="status-tab" data-status="entregue">Entregue</button>
            </div>
          </div>
          <button class="primary-btn" id="new-appointment-btn">+ Novo Agendamento</button>
        </div>

        <form id="appointment-form" class="card-shell form-grid hidden">
          <input type="hidden" name="id" />
          <input type="text" name="clientName" placeholder="Nome do cliente" required />
          <input type="text" name="vehiclePlate" placeholder="Placa" />
          <input type="text" name="vehicleModel" placeholder="Modelo" />
          <input type="text" name="phone" placeholder="Telefone" />
          <select name="serviceId" id="appointment-service"></select>
          <select name="teamMemberId" id="appointment-team"></select>
          <input type="date" name="appointmentDate" required />
          <input type="time" name="appointmentTime" required />
          <select name="status">
            <option value="aguardando">Aguardando</option>
            <option value="em_lavagem">Em Lavagem</option>
            <option value="pronto">Pronto</option>
            <option value="entregue">Entregue</option>
          </select>
          <input type="number" step="0.01" min="0" name="price" placeholder="Preco" />
          <input type="text" name="notes" placeholder="Observacoes" />
          <div class="form-actions">
            <button type="submit" class="primary-btn">Salvar Agendamento</button>
            <button type="button" class="ghost-btn" id="cancel-appointment-btn">Cancelar</button>
          </div>
        </form>

        <div id="appointments-list" class="stack-list"></div>
      </section>

      <section class="view" id="view-services">
        <div class="card-shell section-head">
          <h2>Servicos Cadastrados</h2>
          <button class="primary-btn" id="new-service-btn">+ Novo Servico</button>
        </div>
        <form id="service-form" class="card-shell form-grid hidden">
          <input type="hidden" name="id" />
          <input type="text" name="name" placeholder="Nome do servico" required />
          <input type="number" step="0.01" min="0" name="price" placeholder="Preco" required />
          <input type="number" min="1" name="durationMinutes" placeholder="Duracao (min)" required />
          <select name="active">
            <option value="1">Ativo</option>
            <option value="0">Inativo</option>
          </select>
          <div class="form-actions">
            <button type="submit" class="primary-btn">Salvar Servico</button>
            <button type="button" class="ghost-btn" id="cancel-service-btn">Cancelar</button>
          </div>
        </form>
        <div id="services-list" class="stack-list"></div>
      </section>

      <section class="view" id="view-team">
        <div class="card-shell section-head">
          <h2>Equipe</h2>
          <button class="primary-btn" id="new-team-btn">+ Novo Funcionario</button>
        </div>
        <form id="team-form" class="card-shell form-grid hidden">
          <input type="hidden" name="id" />
          <input type="text" name="name" placeholder="Nome" required />
          <input type="text" name="role" placeholder="Cargo" required />
          <input type="number" step="0.01" min="0" name="salary" placeholder="Salario" required />
          <input type="text" name="shiftLabel" placeholder="Turno (ex.: Dia 1)" />
          <select name="active">
            <option value="1">Ativo</option>
            <option value="0">Inativo</option>
          </select>
          <div class="form-actions">
            <button type="submit" class="primary-btn">Salvar Funcionario</button>
            <button type="button" class="ghost-btn" id="cancel-team-btn">Cancelar</button>
          </div>
        </form>
        <div id="team-list" class="stack-list"></div>
      </section>

      <section class="view" id="view-clients">
        <div class="card-shell section-head">
          <h2>Clientes</h2>
          <button class="primary-btn" id="new-client-btn">+ Novo Cliente</button>
        </div>
        <form id="client-form" class="card-shell form-grid hidden">
          <input type="hidden" name="id" />
          <input type="text" name="name" placeholder="Nome" required />
          <input type="email" name="email" placeholder="Email" />
          <input type="text" name="phone" placeholder="Telefone" />
          <select name="status">
            <option value="active">Ativo</option>
            <option value="lead">Lead</option>
            <option value="inactive">Inativo</option>
          </select>
          <input type="text" name="notes" placeholder="Observacoes" />
          <div class="form-actions">
            <button type="submit" class="primary-btn">Salvar Cliente</button>
            <button type="button" class="ghost-btn" id="cancel-client-btn">Cancelar</button>
          </div>
        </form>
        <div id="clients-list" class="stack-list"></div>
      </section>

      <section class="view" id="view-billing">
        <div class="card-shell section-head"><h2>Assinatura</h2></div>
        <form id="subscription-form" class="card-shell form-grid">
          <select name="planStatus">
            <option value="active">Plano Ativo</option>
            <option value="inactive">Plano Inativo</option>
          </select>
          <input type="number" step="0.01" min="0" name="monthlyFee" placeholder="Mensalidade" required />
          <input type="date" name="nextBillingDate" />
          <div class="form-actions">
            <button type="submit" class="primary-btn">Atualizar Assinatura</button>
          </div>
        </form>
      </section>

      <p id="app-message" class="app-message"></p>
    </main>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
