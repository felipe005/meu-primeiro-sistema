<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Lava-Jato Multi-tenant | Login</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="auth-body">
  <main class="auth-container">
    <section class="auth-panel">
      <h1>LaunchSaaS</h1>
      <p>Plataforma SaaS para <strong>Lava-Jato</strong> com multi-tenant.</p>

      <div class="tabs">
        <button class="tab active" data-target="login-form">Entrar</button>
        <button class="tab" data-target="register-form">Criar empresa</button>
      </div>

      <form id="login-form" class="form active">
        <label>Email</label>
        <input type="email" name="email" required />
        <label>Senha</label>
        <input type="password" name="password" required />
        <button type="submit">Acessar painel</button>
      </form>

      <form id="register-form" class="form">
        <div class="promo-card">
          <p class="promo-badge">Promocao de Lancamento</p>
          <p class="promo-title">Assine agora por <strong>R$ 49,99/mês</strong></p>
          <p class="promo-subtitle">De R$ 99,90 por R$ 49,99 nos primeiros meses.</p>
        </div>

        <label>Nome da empresa</label>
        <input type="text" name="companyName" required />
        <label>Tipo de negocio</label>
        <input type="text" name="businessType" value="Lava-Jato" required />
        <label>Nome do admin</label>
        <input type="text" name="adminName" required />
        <label>Email admin</label>
        <input type="email" name="email" required />
        <label>Senha admin</label>
        <input type="password" name="password" minlength="6" required />
        <label>Mensalidade (R$)</label>
        <input type="number" name="monthlyFee" min="0" step="0.01" value="49.99" readonly />
        <label>Forma de pagamento preferida</label>
        <select name="preferredPaymentMethod" required>
          <option value="pix">Pix</option>
          <option value="cartao_credito">Cartao de Credito</option>
          <option value="cartao_debito">Cartao de Debito</option>
          <option value="boleto">Boleto</option>
          <option value="transferencia">Transferencia</option>
        </select>
        <button type="submit">Criar conta SaaS</button>
      </form>

      <p id="auth-message" class="message"></p>
    </section>
  </main>

  <script src="/js/auth.js"></script>
</body>
</html>
