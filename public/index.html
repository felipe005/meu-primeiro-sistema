<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FabricaFlow | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f0f9ff',
                500: '#0284c7',
                700: '#0369a1',
                900: '#0c4a6e'
              }
            }
          }
        }
      };
    </script>
  </head>
  <body class="min-h-screen bg-slate-100">
    <main class="grid min-h-screen md:grid-cols-2">
      <section class="hidden bg-brand-900 p-10 text-white md:flex md:flex-col md:justify-between">
        <div>
          <p class="text-sm uppercase tracking-[0.2em] text-brand-50/80">FabricaFlow</p>
          <h1 class="mt-6 text-4xl font-semibold leading-tight">Controle sua produção sem papel.</h1>
        </div>
        <p class="text-sm text-brand-50/80">Sistema de produção para fábrica de roupas.</p>
      </section>

      <section class="flex items-center justify-center p-6">
        <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-xl">
          <h2 class="text-2xl font-semibold text-slate-900">Entrar no sistema</h2>
          <p class="mt-2 text-sm text-slate-500">Use seu e-mail e senha para acessar.</p>

          <form id="loginForm" class="mt-8 space-y-4">
            <label class="block">
              <span class="mb-1 block text-sm font-medium text-slate-700">E-mail</span>
              <input id="email" type="email" required class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-brand-500 focus:ring" />
            </label>

            <label class="block">
              <span class="mb-1 block text-sm font-medium text-slate-700">Senha</span>
              <input id="senha" type="password" required class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-brand-500 focus:ring" />
            </label>

            <button class="w-full rounded-lg bg-brand-700 px-4 py-2 font-medium text-white transition hover:bg-brand-900">Entrar</button>
          </form>

          <p id="errorMessage" class="mt-4 hidden rounded-lg bg-red-50 p-3 text-sm text-red-700"></p>
        </div>
      </section>
    </main>

    <script src="/js/auth.js"></script>
  </body>
</html>
